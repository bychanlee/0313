<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM_BREACH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  :root {
    --bg: #0a0a0a;
    --accent: #00ff41;
    --danger: #ff0033;
    --danger-dim: #330009;
    --text-dim: #003d10;
  }

  body {
    background: var(--bg);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none; z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.65) 100%);
    pointer-events: none; z-index: 999;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.5} 94%{opacity:1} 95.5%{opacity:.3} 96%{opacity:1} }
  @keyframes glitchX { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2px)} 75%{transform:translateX(2px)} }
  @keyframes scanMove { 0%{top:-5%} 100%{top:105%} }
  @keyframes fadeIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
  @keyframes completeBurst { 0%{box-shadow:0 0 0 rgba(0,255,65,0)} 50%{box-shadow:0 0 60px rgba(0,255,65,.6)} 100%{box-shadow:0 0 0 rgba(0,255,65,0)} }
  @keyframes revealCell { from{opacity:0} to{opacity:1} }

  .scanline-move {
    position: fixed; left:0; right:0; height: 3px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,65,.04), transparent);
    animation: scanMove 4s linear infinite;
    pointer-events: none; z-index: 998;
  }

  .container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
    animation: flicker 8s infinite;
  }

  .hdr { text-align: center; margin-bottom: 24px; }
  .date {
    font-size: 42px; color: var(--danger); letter-spacing: 16px; margin-bottom: 10px;
    animation: glitchX 4s infinite;
  }
  .sub { font-size: 16px; color: var(--text-dim); letter-spacing: 6px; }
  .cur { animation: blink 1s step-end infinite; }

  .status {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 700px; margin-bottom: 14px;
    font-size: 16px; padding: 0 4px;
  }
  .recovery { color: var(--accent); }
  .mv { color: #444; }
  .name-signal {
    font-size: 16px;
    color: var(--danger);
    letter-spacing: 3px;
    opacity: 0.6;
    overflow: hidden;
    white-space: nowrap;
    max-width: 700px;
    text-align: center;
    margin-bottom: 8px;
    height: 22px;
  }

  .grid-area {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .grid-wrap {
    position: relative;
    border: 1px solid #1a1a1a;
  }
  .grid {
    display: grid;
    width: min(680px, 92vw);
    height: min(680px, 92vw);
    background: #0d0d0d;
    gap: 0;
  }

  .c {
    position: relative;
    transition: background .08s;
  }

  /* QR cell colors */
  .c-b { background: #d0d0d0; }
  .c-w { background: #141414; }

  /* Hidden cells (not yet revealed) */
  .c-hidden { background: #0d0d0d !important; }

  /* Puzzle area cells — clickable */
  .c-puzzle { cursor: pointer; }
  .c-puzzle:hover { opacity: 0.8; }

  /* Hint: small reference grid */
  .hint-wrap { text-align: center; }
  .hint-label { font-size: 12px; color: #1a1a1a; letter-spacing: 4px; margin-bottom: 6px; }
  .hint-grid {
    display: inline-grid;
    gap: 2px;
    opacity: 0.12;
  }
  .hint-cell { width: 22px; height: 22px; }
  .hint-b { background: #d0d0d0; }
  .hint-w { background: #333; }

  /* Revealed cells animation */
  .c-reveal { animation: revealCell .4s ease forwards; }

  .ftr { margin-top: 20px; text-align: center; font-size: 14px; color: #2a2a2a; max-width: 700px; }
  .ftr .h { color: #383838; margin-top: 8px; }

  .err {
    position: fixed; font-size: 9px; color: var(--danger); opacity: .18;
    pointer-events: none; z-index: 500; white-space: nowrap;
  }

  .done-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.97);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; animation: fadeIn .8s ease;
  }
  .done-title { font-size: 22px; color: var(--accent); letter-spacing: 8px; margin-bottom: 28px; }
  .qr-box { border: 2px solid var(--accent); animation: completeBurst 2s ease-in-out infinite; }
  .done-scan { margin-top: 28px; font-size: 16px; color: var(--text-dim); letter-spacing: 4px; animation: blink 2s step-end infinite; }
</style>
</head>
<body>

<div class="scanline-move"></div>
<div class="container" id="app">
  <div style="color:var(--text-dim);font-size:11px;">LOADING SYSTEM<span class="cur">_</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script>
// ============================================
// Real QR Code
// ============================================
const TARGET_URL = "https://bychanlee.github.io/0313/";

const qr = qrcode(0, 'L');
qr.addData(TARGET_URL);
qr.make();

const SIZE = qr.getModuleCount();
const TOTAL = SIZE * SIZE;

const qrMatrix = [];
for (let r = 0; r < SIZE; r++) {
  const row = [];
  for (let c = 0; c < SIZE; c++) {
    row.push(qr.isDark(r, c) ? 1 : 0);
  }
  qrMatrix.push(row);
}

// Flat target: 1=dark, 0=light
const target = [];
for (let r = 0; r < SIZE; r++) {
  for (let c = 0; c < SIZE; c++) {
    target.push(qrMatrix[r][c]);
  }
}

// ============================================
// Puzzle area: center 3x3
// ============================================
const CENTER = Math.floor(SIZE / 2);
const HALF = 1;
const puzzlePositions = new Set();
for (let r = CENTER - HALF; r <= CENTER + HALF; r++) {
  for (let c = CENTER - HALF; c <= CENTER + HALF; c++) {
    puzzlePositions.add(r * SIZE + c);
  }
}

// ============================================
// State: current cell values (only puzzle area can differ from target)
// ============================================
const state = new Array(TOTAL);
for (let i = 0; i < TOTAL; i++) state[i] = target[i];

// Lights Out: toggling a cell also flips its orthogonal neighbors (within puzzle area)
function lightsOutToggle(pos) {
  const r = Math.floor(pos / SIZE), c = pos % SIZE;
  const cells = [pos];
  const neighbors = [
    [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]
  ];
  for (const [nr, nc] of neighbors) {
    const npos = nr * SIZE + nc;
    if (puzzlePositions.has(npos)) cells.push(npos);
  }
  for (const p of cells) {
    state[p] = state[p] === 1 ? 0 : 1;
  }
}

// Flip ALL puzzle cells so recovery starts at 0%
const puzzleArr = [...puzzlePositions];
for (const idx of puzzleArr) {
  state[idx] = state[idx] === 1 ? 0 : 1;
}

let clicks = 0;
let completed = false;
let revealed = false;

// ============================================
// Logic
// ============================================
function getRecovery() {
  let ok = 0;
  for (const p of puzzlePositions) {
    if (state[p] === target[p]) ok++;
  }
  return Math.floor(ok / puzzlePositions.size * 100);
}

function isComplete() {
  for (const p of puzzlePositions) {
    if (state[p] !== target[p]) return false;
  }
  return true;
}

function doToggle(pos) {
  if (completed) return;
  if (!puzzlePositions.has(pos)) return;
  lightsOutToggle(pos);
  clicks++;

  if (isComplete()) {
    completed = true;
    render();
    setTimeout(revealQR, 400);
    return;
  }
  render();
}

// ============================================
// Reveal sequence: show full QR after solving
// ============================================
function revealQR() {
  revealed = true;
  render();
  // After reveal animation, show scan overlay
  setTimeout(() => {
    showScanOverlay();
  }, 2000);
}

function showScanOverlay() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="done-overlay">
      <div class="done-title">SYSTEM_RECOVERED</div>
      <canvas id="qr-canvas" class="qr-box"></canvas>
      <div class="done-scan">SCAN TO PROCEED<span class="cur">_</span></div>
    </div>`;
  drawFinalQR();
}

// ============================================
// Error messages
// ============================================
const ERRS = ["SEGFAULT 0x00FF", "KERNEL PANIC", "BUFFER OVERFLOW", "ACCESS DENIED",
  "CORRUPTED SECTOR", "FATAL EXCEPTION", "MEMORY LEAK", "STACK OVERFLOW",
  "INVALID OPCODE", "BREACH DETECTED", "DATA LOSS", "CHECKSUM FAIL"];

function spawnErr() {
  if (completed) return;
  if (Math.random() < .35) {
    const el = document.createElement('div');
    el.className = 'err';
    el.textContent = '> ' + ERRS[Math.floor(Math.random() * ERRS.length)];
    el.style.left = Math.random() * 80 + 5 + '%';
    el.style.top = Math.random() * 80 + 5 + '%';
    el.style.opacity = .1 + Math.random() * .15;
    el.style.fontSize = (8 + Math.random() * 3) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000 + Math.random() * 3000);
  }
}
setInterval(spawnErr, 1800);

// ============================================
// Name signal: repeats based on recovery %
// ============================================
function buildNameSignal(rec) {
  if (rec <= 0) return '';
  const name = '김유진';
  const repeats = Math.ceil(rec / 100 * 10); // 0~10 repeats
  return name.repeat(repeats);
}

// ============================================
// Hint grid: shows target pattern for puzzle area
// ============================================
function buildHintGrid() {
  const side = HALF * 2 + 1;
  let cells = '';
  for (let r = CENTER - HALF; r <= CENTER + HALF; r++) {
    for (let c = CENTER - HALF; c <= CENTER + HALF; c++) {
      const val = target[r * SIZE + c];
      cells += `<div class="hint-cell ${val === 1 ? 'hint-b' : 'hint-w'}"></div>`;
    }
  }
  return `<div class="hint-wrap">
    <div class="hint-label">MEMORY_FRAGMENT</div>
    <div class="hint-grid" style="grid-template-columns:repeat(${side},1fr);">${cells}</div>
  </div>`;
}

// ============================================
// Render
// ============================================
function render() {
  const app = document.getElementById('app');
  const rec = getRecovery();

  let cells = '';
  for (let i = 0; i < TOTAL; i++) {
    const isPuzzle = puzzlePositions.has(i);

    if (!isPuzzle && !revealed) {
      cells += `<div class="c c-hidden"></div>`;
    } else if (isPuzzle && !completed) {
      const colorCls = state[i] === 1 ? 'c-b' : 'c-w';
      cells += `<div class="c c-puzzle ${colorCls}" onclick="doToggle(${i})"></div>`;
    } else {
      const val = isPuzzle ? state[i] : target[i];
      const colorCls = val === 1 ? 'c-b' : 'c-w';
      const revealCls = !isPuzzle && revealed ? ' c-reveal' : '';
      let style = '';
      if (!isPuzzle && revealed) {
        const r = Math.floor(i / SIZE), c = i % SIZE;
        const dist = Math.abs(r - CENTER) + Math.abs(c - CENTER);
        style = `style="animation-delay:${dist * 15}ms"`;
      }
      cells += `<div class="c ${colorCls}${revealCls}" ${style}></div>`;
    }
  }

  app.innerHTML = `
    <div class="hdr">
      <div class="date">2026-03-13</div>
      <div class="sub">SYSTEM_BREACH<span class="cur">_</span></div>
    </div>
    <div class="name-signal">${buildNameSignal(rec)}</div>
    <div class="grid-area">
      ${!completed && clicks >= 50 ? buildHintGrid() : ''}
      <div class="grid-wrap">
        <div class="grid" style="grid-template-columns:repeat(${SIZE},1fr);grid-template-rows:repeat(${SIZE},1fr);">${cells}</div>
      </div>
    </div>
    <div class="ftr">
      <div class="h">> REPAIR CORRUPTED SECTOR<span class="cur">_</span></div>
    </div>`;
}

function drawFinalQR() {
  const cv = document.getElementById('qr-canvas');
  if (!cv) return;
  const cs = Math.floor(Math.min(280, window.innerWidth * .55) / SIZE);
  const quiet = 4;
  const ts = cs * SIZE + quiet * 2;
  cv.width = ts;
  cv.height = ts;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, ts, ts);
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      ctx.fillStyle = qrMatrix[r][c] === 1 ? '#000' : '#fff';
      ctx.fillRect(quiet + c * cs, quiet + r * cs, cs, cs);
    }
  }
}

render();
</script>
</body>
</html>
